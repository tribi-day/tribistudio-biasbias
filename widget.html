<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biasbias</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  .card {
    position: relative;
    width: 100%;
    max-width: 340px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.16);
    background: #f5f5f5;
  }
  .card img {
    width: 100%;
    display: block;
  }
  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .refresh-hint {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loading, .error {
    color: #aaa;
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
  }
  .error a { color: #888; }
</style>
</head>
<body>
<div id="app"><div class="loading">불러오는 중...</div></div>

<script>
const params = new URLSearchParams(location.search);
const board = params.get('board');
const mode = params.get('mode') || 'daily'; // daily | random

let pins = [];

function seedRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function pickPin() {
  if (pins.length === 0) return null;
  if (mode === 'daily') {
    // 날짜 기반 시드 → 하루 동안 같은 사진
    const today = new Date();
    const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    return pins[Math.floor(seedRandom(seed) * pins.length)];
  }
  return pins[Math.floor(Math.random() * pins.length)];
}

function render() {
  const pin = pickPin();
  if (!pin) return;
  document.getElementById('app').innerHTML = `
    <div class="card" onclick="renderRandom()">
      <img src="${pin.img}" alt="">
      <div class="badge">${mode === 'daily' ? '오늘의 최애' : '랜덤 최애'}</div>
      <div class="refresh-hint">↻</div>
    </div>
  `;
}

function renderRandom() {
  const pin = pins[Math.floor(Math.random() * pins.length)];
  if (!pin) return;
  const img = document.querySelector('.card img');
  if (img) img.src = pin.img;
}

(async () => {
  const app = document.getElementById('app');
  if (!board) {
    app.innerHTML = '<div class="error">보드 주소가 없어요!<br>위젯 주소 뒤에 ?board=유저명/보드명 을 붙여주세요.</div>';
    return;
  }
  try {
    const r = await fetch(`/api/pinterest?board=${encodeURIComponent(board)}`);
    const d = await r.json();
    if (d.error || !d.pins || d.pins.length === 0) {
      app.innerHTML = `<div class="error">핀을 불러올 수 없어요 :(<br>보드가 전체 공개인지 확인해주세요.<br><small>${d.error || ''}</small></div>`;
      return;
    }
    pins = d.pins;
    render();
  } catch(e) {
    app.innerHTML = '<div class="error">불러올 수 없어요 :(</div>';
  }
})();
</script>
</body>
</html>
