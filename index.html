<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biasbias — 오늘의 최애 위젯</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 440px; width: 100%; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }

  .step { margin-bottom: 24px; }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    margin-right: 8px;
  }
  .step-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; }
  .step-desc { font-size: 13px; color: #777; line-height: 1.7; margin-left: 30px; }

  input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  input:focus { border-color: #1a1a1a; }

  .mode-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid #e0e0e0;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
  }
  .mode-btn.selected { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }

  .gen-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .result {
    display: none;
    margin-top: 20px;
    background: #fff;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    padding: 16px;
  }
  .result.show { display: block; }
  .result-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .result-url {
    font-size: 13px;
    word-break: break-all;
    background: #f5f5f5;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .copy-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1.5px solid #1a1a1a;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .footer { margin-top: 32px; font-size: 12px; color: #bbb; text-align: center; }
  .footer a { color: #999; }
</style>
</head>
<body>
<div class="container">
  <h1>biasbias 📌</h1>
  <p class="sub">핀터레스트 보드를 연결하면, 내 보드에 저장한 이미지가 랜덤으로 뜨는 노션 갤러리 위젯을 만들 수 있어요.</p>

  <div class="step">
    <div class="step-title"><span class="step-num">1</span>핀터레스트에 공개 보드 만들기</div>
    <div class="step-desc">원하는 사진을 핀해서 보드에 모아주세요. 보드는 꼭! <b>전체 공개!</b> 여야 합니다!</div>
  </div>

  <div class="step">
    <div class="step-title"><span class="step-num">2</span>보드 주소 붙여넣기</div>
    <div class="step-desc" style="margin-bottom:10px;">예: pinterest.com/유저명/보드명</div>
    <input id="boardInput" type="text" placeholder="https://www.pinterest.com/username/boardname/">
  </div>

  <div class="step">
    <div class="step-title"><span class="step-num">3</span>모드 선택</div>
    <div class="mode-row">
      <button class="mode-btn selected" data-mode="daily" onclick="selectMode(this)">📅 하루 한 장</button>
      <button class="mode-btn" data-mode="random" onclick="selectMode(this)">🎲 열 때마다 랜덤</button>
    </div>
    <div class="step-desc" style="margin-left:0; margin-top:2px;">이미지를 클릭하면 랜덤으로 변경됩니다.</div>
  </div>

  <div class="step">
    <div class="step-title"><span class="step-num">4</span>디자인 선택</div>
    <div class="mode-row">
      <button class="style-btn mode-btn selected" data-style="simple" onclick="selectStyle(this)">🖤 심플</button>
      <button class="style-btn mode-btn" data-style="frame" onclick="selectStyle(this)">🖼️ 액자</button>
      <button class="style-btn mode-btn" data-style="retro" onclick="selectStyle(this)">📼 레트로</button>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">위젯 주소 만들기</button>

  <div class="result" id="result">
    <div class="result-label">위젯 주소 — 노션에서 /embed 로 붙여넣으세요!</div>
    <div class="result-url" id="resultUrl"></div>
    <button class="copy-btn" onclick="copyUrl()">복사하기</button>
  </div>

  <div class="footer">made by <a href="https://twitter.com/way_byday" target="_blank">@tribi.studio</a></div>
</div>

<script>
let mode = 'daily';
let style = 'simple';
function selectMode(btn) {
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  mode = btn.dataset.mode;
}
function selectStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  style = btn.dataset.style;
}
function generate() {
  const raw = document.getElementById('boardInput').value.trim();
  if (!raw) { alert('보드 주소를 입력해주세요!'); return; }
  const cleaned = raw
    .replace(/^https?:\/\/(www\.)?pinterest\.[a-z.]+\//, '')
    .replace(/\/$/, '');
  const url = `${location.origin}/widget.html?board=${encodeURIComponent(cleaned)}&mode=${mode}&style=${style}`;
  document.getElementById('resultUrl').textContent = url;
  document.getElementById('result').classList.add('show');
}
function copyUrl() {
  navigator.clipboard.writeText(document.getElementById('resultUrl').textContent);
  document.querySelector('.copy-btn').textContent = '복사됐어요!';
  setTimeout(() => document.querySelector('.copy-btn').textContent = '복사하기', 1500);
}
</script>
</body>
</html>
